name: build

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest

      - name: Create build folder
        run: |
          mkdir build
          cp -r engine build/
          cp -r gui build/
          cp -r game_data build/
          cp main.py build/
          cp config.py build/
          cp requirements.txt build/

      - name: Create artifact archive
        run: |
          zip -r ffxiv-bis-solver.zip build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffxiv-bis-solver
          path: ffxiv-bis-solver.zip
